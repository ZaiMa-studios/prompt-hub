<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading... | Prompt Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; }
    .header-section { padding: 18px 16px 0; position: sticky; top: 0; background: #ffffff; z-index: 100; }
    .top-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; flex-shrink: 0; }
    .back-btn svg { width: 22px; height: 22px; stroke: #0d0d0d; stroke-width: 2.5; fill: none; }
    .top-title { font-size: 16px; font-weight: 600; color: #0d0d0d; letter-spacing: -0.2px; font-family: 'Inter', sans-serif; }
    .search-box { position: relative; margin-left: -16px; margin-right: -16px; width: calc(100% + 32px); }
    .search-box input { width: 100%; padding: 12px 14px 12px 42px; border-radius: 0; border: none; border-top: 1px solid rgba(0,0,0,0.06); background: #f8f9fa; font-size: 14px; font-family: 'Inter', sans-serif; color: #0d0d0d; outline: none; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #aaa; stroke-width: 2.5; fill: none; }
    .main-content { background: #ffffff; padding: 20px 16px 40px 16px; width: 100%; overflow-x: hidden; }
    .section-title { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Inter', sans-serif; }
    .prompt-list { display: flex; flex-direction: column; gap: 10px; }
    .row { background: white; border-radius: 14px; padding: 20px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; width: 100%; -webkit-tap-highlight-color: transparent; }
    .row:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(108,71,255,0.15); background: #f0ebff; transition: all 0.1s ease; }
    .emoji { font-size: 28px; display: block; min-width: 36px; text-align: center; }
    .label { font-weight: 600; color: #0d0d0d; font-size: 14px; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>

<div class="header-section">
  <div class="top-nav">
    <button class="back-btn" onclick="window.location.href='page1.html#activities'">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h1 class="top-title">Reading...</h1>
  </div>
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="M21 21l-4.35-4.35"></path>
    </svg>
    <input type="text" id="searchInput" placeholder="What are you reading?" oninput="filterRows()">
  </div>
</div>

<div class="main-content">
  <div class="prompt-list" id="promptList">
    <a href="subreading.html#books-fiction-non-fiction" class="row">
      <span class="emoji">📖</span>
      <span class="label">Books</span>
    </a>
    <a href="subreading.html#newspapers-magazines" class="row">
      <span class="emoji">📰</span>
      <span class="label">Press</span>
    </a>
    <a href="subreading.html#academic-papers" class="row">
      <span class="emoji">📝</span>
      <span class="label">Journals</span>
    </a>
    <a href="subreading.html#blogs-articles" class="row">
      <span class="emoji">🌐</span>
      <span class="label">Articles</span>
    </a>
    <a href="subreading.html#comics-graphic-novels" class="row">
      <span class="emoji">🦸</span>
      <span class="label">Comics </span>
    </a>
    <a href="subreading.html#social-media-posts" class="row">
      <span class="emoji">📱</span>
      <span class="label">Social media</span>
    </a>
  </div>
</div>

<script>
  function filterRows() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.row').forEach(row => {
      const label = row.querySelector('.label').innerText.toLowerCase();
      row.style.display = label.includes(term) ? 'flex' : 'none';
    });
  }
</script>

</body>
</html>
